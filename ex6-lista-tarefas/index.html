<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas</title>

  <style>
    /* Estilo para tarefas completas */
    .completed {
      text-decoration: line-through; /* Risca o texto */
      color: gray; /* Muda a cor para cinza */
    }
  </style>

</head>
<body>

  <!-- Campo de entrada para nova tarefa -->
  <input type="text" id="taskInput" placeholder="Nova tarefa">

  <!-- Botão para adicionar tarefa -->
  <button id="addButton">Adicionar</button>

  <!-- Lista onde as tarefas serão exibidas -->
  <ul id="taskList"></ul>

  <!-- Script JavaScript -->
  <script>

    // Seleciona os elementos do DOM
    const taskInput = document.querySelector('#taskInput');  
    const addButton = document.querySelector('#addButton');  
    const taskList = document.querySelector('#taskList');    

    // getElementById --- chama apenas o ID, não precisa do #, e é mais rápido que querySelector
    // querySelector --- pode chamar por ID, classe, tag, etc.

    // Evento de clique no botão
    addButton.addEventListener('click', () => {

      // Obtém o texto da tarefa
      const taskText = taskInput.value.trim(); //value.trim() remove espaços em branco no início e no final do texto

      // Verifica se o campo não está vazio
      if (taskText !== '') {

        // Cria um novo item da lista
        const li = document.createElement('li');

        // Coloca o texto digitado dentro da li
        li.textContent = taskText;

        // Evento de clique para marcar como concluída
        li.addEventListener('click', () => {
          li.classList.toggle('completed');
        });

        // Adiciona a tarefa na lista
        taskList.appendChild(li);

        // Limpa o campo de texto
        taskInput.value = '';

      }

    });

  </script>
</body>
</html>
